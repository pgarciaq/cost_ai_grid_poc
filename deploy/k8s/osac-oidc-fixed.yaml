---
# Python OIDC Server (Kubernetes-compatible version)
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-server-script
  namespace: osac
data:
  oidc_server.py: |
    #!/usr/bin/env python3
    """
    Minimal HTTPS OIDC discovery + JWKS server for OSAC in Kubernetes.

    Serves:
      /.well-known/openid-configuration
      /.well-known/jwks.json

    Uses certs mounted from Kubernetes secret.
    """

    import json
    import hashlib
    import base64
    import ssl
    import http.server
    import os
    import sys
    from cryptography.hazmat.primitives import serialization

    # In Kubernetes, certs are mounted to /certs
    ISSUER = os.environ.get("ISSUER", "https://osac-oidc.osac.svc:8013")
    PORT = int(os.environ.get("PORT", "8013"))
    CERT_DIR = os.environ.get("CERT_DIR", "/certs")

    key_path = os.path.join(CERT_DIR, "tls.key")
    crt_path = os.path.join(CERT_DIR, "tls.crt")

    if not os.path.exists(key_path):
        print(f"ERROR: {key_path} not found. Check volume mount.", file=sys.stderr)
        sys.exit(1)


    def b64url(n: int) -> str:
        length = (n.bit_length() + 7) // 8
        return base64.urlsafe_b64encode(n.to_bytes(length, "big")).rstrip(b"=").decode()


    with open(key_path, "rb") as f:
        _private_key = serialization.load_pem_private_key(f.read(), password=None)

    _pub = _private_key.public_key().public_numbers()

    _jwk_thumb = {"e": b64url(_pub.e), "kty": "RSA", "n": b64url(_pub.n)}
    _thumbprint = json.dumps(_jwk_thumb, separators=(",", ":"), sort_keys=True)
    KID = base64.urlsafe_b64encode(
        hashlib.sha256(_thumbprint.encode()).digest()
    ).rstrip(b"=").decode()

    JWKS_BODY = json.dumps({
        "keys": [{
            "kty": "RSA",
            "use": "sig",
            "alg": "RS256",
            "kid": KID,
            "n": b64url(_pub.n),
            "e": b64url(_pub.e),
        }]
    }).encode()

    DISCOVERY_BODY = json.dumps({
        "issuer": ISSUER,
        "jwks_uri": f"{ISSUER}/.well-known/jwks.json",
    }).encode()


    class Handler(http.server.BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            # Log to stdout for Kubernetes
            print(f"{self.address_string()} - {fmt % args}")

        def do_GET(self):
            if self.path == "/.well-known/jwks.json":
                body = JWKS_BODY
                ct = "application/json"
            elif self.path == "/.well-known/openid-configuration":
                body = DISCOVERY_BODY
                ct = "application/json"
            else:
                self.send_response(404)
                self.end_headers()
                return
            self.send_response(200)
            self.send_header("Content-Type", ct)
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)


    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
    ctx.load_cert_chain(crt_path, key_path)

    server = http.server.HTTPServer(("0.0.0.0", PORT), Handler)
    server.socket = ctx.wrap_socket(server.socket, server_side=True)

    print(f"OIDC server listening at {ISSUER}")
    print(f"  kid: {KID}")
    print(f"  certs: {CERT_DIR}")
    sys.stdout.flush()
    server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osac-oidc
  namespace: osac
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osac-oidc
  template:
    metadata:
      labels:
        app: osac-oidc
    spec:
      containers:
        - name: oidc
          image: python:3.12-slim
          command:
            - sh
            - -c
            - pip install --no-cache-dir cryptography && python3 /scripts/oidc_server.py
          env:
            - name: ISSUER
              value: https://osac-oidc.osac.svc:8013
            - name: CERT_DIR
              value: /certs
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - containerPort: 8013
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: oidc-server-script
        - name: certs
          secret:
            secretName: osac-grpc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: osac-oidc
  namespace: osac
spec:
  ports:
    - port: 8013
  selector:
    app: osac-oidc
