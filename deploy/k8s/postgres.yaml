apiVersion: v1
kind: Service
metadata:
  name: cost-db
  namespace: cost-mgmt
spec:
  ports:
    - port: 5432
  selector:
    app: cost-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cost-db
  namespace: cost-mgmt
spec:
  serviceName: cost-db
  replicas: 1
  selector:
    matchLabels:
      app: cost-db
  template:
    metadata:
      labels:
        app: cost-db
    spec:
      containers:
        - name: postgres
          image: quay.io/sclorg/postgresql-18-c10s:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: cost-db-credentials
                  key: user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cost-db-credentials
                  key: password
            - name: POSTGRESQL_DATABASE
              value: costdb
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "user"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/pgsql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
